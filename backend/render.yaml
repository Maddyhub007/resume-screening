
# render.yaml — Render deployment configuration
# https://render.com/docs/render-yaml

services:
  - type: web
    name: ats-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_lg
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ats-postgres
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false   # Set in Render dashboard — your Vercel URL
      - key: GROQ_API_KEY
        sync: false   # Set in Render dashboard
      - key: LOG_LEVEL
        value: WARNING
      - key: LOG_FORMAT
        value: json
      - key: WORKERS
        value: "2"
    healthCheckPath: /api/v1/health

databases:
  - name: ats-postgres
    plan: free
    databaseName: ats_db
    user: ats_user