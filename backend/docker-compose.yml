services:
  db:
    image: postgres:16
    container_name: ats_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ats_pass
      POSTGRES_DB: ats_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ats_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local